server {
  listen 80;
  server_name _;

  # Resolver DNS dinámico: nginx resuelve el upstream en runtime, no al arrancar
  resolver 8.8.8.8 valid=300s;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/html text/css application/javascript application/json;
  gzip_min_length 1024;

  # Proxy hacia la API externa de Ecoranger
  location /ecoranger-api/ {
    set $upstream https://api.ecoranger.org;
    proxy_pass $upstream/;
    proxy_set_header Host api.ecoranger.org;
    proxy_ssl_server_name on;
    proxy_set_header x-api-key $http_x_api_key;
    proxy_set_header Accept application/json;
  }

  # Assets con hash en el nombre → cache agresivo
  location ~* \.(js|css|woff2?|png|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA: todo lo demás cae en index.html
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
